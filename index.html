<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.sound.min.js"></script>
    <style>
    html, body {
      margin: 0;
      padding: 0;
    }
    canvas {
      display: block;
    }
    </style>
    <meta charset="utf-8" />

  </head>
  <body>
    <script>
      var x = 50;
      var speedX = 5;
      
      var y = 50;
      var speedY = 5;
      
      function setup() {
        createCanvas(400, 400);
      
        rectMode(CENTER);
        textAlign(CENTER, CENTER);
        textSize(20);
      }
      
      function draw() {
        background(0);
        
        fill('white');
        text('Zugysensae™', x, y);
        
        x = x + speedX;
        y = y + speedY;
        
        if (x > width - 55){
        	speedX = -6;
        }
        
        if (x < 55){
          speedX = 6;
        }
        if (y > height - 55){
        	speedY = -5;
        }
        if (y < 55){
          speedY = 5;
        }
      }
    </script>
  </body>
</html>
